<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#FF6B35">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="HR Admin">
  <link rel="apple-touch-icon" href="logo.jpeg">
  <link rel="manifest" href="manifest.json">
  <title>Admin — HR Burger House</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ── Header ── -->
  <header class="header">
    <img src="logo.jpeg" alt="HR Burger House">
    <div class="header-info">
      <h1>HR Burger House</h1>
      <div class="subtitulo">Panel de Administración</div>
    </div>
    <button id="themeToggle" title="Cambiar tema">🌙</button>
  </header>

  <!-- ═══════════════════════════════════════════════════════════════════════
       PANTALLA DE PIN
  ═══════════════════════════════════════════════════════════════════════════ -->
  <div id="pinScreen" class="pin-screen" style="display:none;">
    <img src="logo.jpeg" alt="Logo" class="pin-logo">
    <div class="pin-titulo">Ingresa el PIN de administrador</div>

    <!-- Indicadores de dígitos -->
    <div class="pin-puntos">
      <div class="pin-punto"></div>
      <div class="pin-punto"></div>
      <div class="pin-punto"></div>
      <div class="pin-punto"></div>
    </div>

    <!-- Teclado numérico -->
    <div class="pin-pad">
      <button class="pin-tecla" data-digito="1">1</button>
      <button class="pin-tecla" data-digito="2">2</button>
      <button class="pin-tecla" data-digito="3">3</button>
      <button class="pin-tecla" data-digito="4">4</button>
      <button class="pin-tecla" data-digito="5">5</button>
      <button class="pin-tecla" data-digito="6">6</button>
      <button class="pin-tecla" data-digito="7">7</button>
      <button class="pin-tecla" data-digito="8">8</button>
      <button class="pin-tecla" data-digito="9">9</button>
      <button class="pin-tecla vacia" aria-hidden="true"></button>
      <button class="pin-tecla" data-digito="0">0</button>
      <button class="pin-tecla eliminar" id="pinEliminar" title="Borrar">⌫</button>
    </div>

    <div style="margin-top:28px;text-align:center;">
      <a href="index.html" style="color:var(--texto-muted);font-size:0.82rem;text-decoration:none;">
        ← Volver a inventario empleado
      </a>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════════════════════════════════
       PANEL ADMIN (oculto hasta verificar PIN)
  ═══════════════════════════════════════════════════════════════════════════ -->
  <div id="adminPanel" style="display:none;">

    <!-- Nav tabs -->
    <nav class="nav-admin">
      <button class="tab-btn" data-tab="inventario" onclick="cambiarTab('inventario')">Inventario</button>
      <button class="tab-btn" data-tab="historial" onclick="cambiarTab('historial')">Historial</button>
      <button class="tab-btn" data-tab="catalogo" onclick="cambiarTab('catalogo')">Catálogo</button>
      <button class="tab-btn" data-tab="ajustes" onclick="cambiarTab('ajustes')">Ajustes</button>
    </nav>

    <!-- Tab: Inventario actual -->
    <div id="tab-inventario" class="admin-tab"></div>

    <!-- Tab: Historial -->
    <div id="tab-historial" class="admin-tab"></div>

    <!-- Tab: Catálogo -->
    <div id="tab-catalogo" class="admin-tab"></div>

    <!-- Tab: Ajustes (HTML estático) -->
    <div id="tab-ajustes" class="admin-tab" style="padding:14px;">
      <div class="card" style="margin-bottom:12px;">
        <div style="font-weight:700;margin-bottom:12px;">🔒 Seguridad</div>
        <p style="font-size:0.82rem;color:var(--texto-muted);margin-bottom:12px;">
          El PIN por defecto es <strong>1234</strong>. Cámbialo ahora.
        </p>
        <button class="btn btn-primario btn-block" onclick="mostrarCambiarPin()">Cambiar PIN de administrador</button>
      </div>

      <div class="card" style="margin-bottom:12px;">
        <div style="font-weight:700;margin-bottom:12px;">👤 Sesión</div>
        <button class="btn btn-peligro btn-block" onclick="cerrarSesion()">Cerrar sesión</button>
      </div>

      <div class="card">
        <div style="font-weight:700;margin-bottom:12px;">🔗 Navegación</div>
        <a href="index.html" class="btn btn-secundario btn-block" style="text-decoration:none;">
          ← Ir a vista de empleado
        </a>
      </div>
    </div>

  </div><!-- /adminPanel -->

  <!-- ═══════════════════════════════════════════════════════════════════════
       MODALES
  ═══════════════════════════════════════════════════════════════════════════ -->

  <!-- Modal: Nuevo / Editar producto -->
  <div id="modalProducto" class="modal-overlay" style="display:none;" role="dialog" aria-modal="true">
    <div class="modal" style="max-height:90vh;overflow-y:auto;">
      <h3 id="modalProdTitulo">Nuevo producto</h3>

      <div class="form-grupo">
        <label class="form-label" for="inputNombre">Nombre *</label>
        <input type="text" id="inputNombre" class="form-input" placeholder="Ej: Carne de res molida">
      </div>

      <div class="form-grupo">
        <label class="form-label" for="selectCategoria">Categoría</label>
        <select id="selectCategoria" class="form-select">
          <option>Carnes y Proteínas</option>
          <option>Vegetales y Frescos</option>
          <option>Bebidas e Insumos</option>
          <option>Salsas y Condimentos</option>
          <option>Otro</option>
        </select>
      </div>

      <div class="form-grupo">
        <label class="form-label" for="selectUnidad">Unidad de medida</label>
        <select id="selectUnidad" class="form-select">
          <option>kg</option>
          <option>litro</option>
          <option>pieza</option>
          <option>paquete</option>
          <option>caja</option>
          <option>bote</option>
          <option>bolsa</option>
        </select>
      </div>

      <div class="form-grupo">
        <label class="form-label" for="inputStockMin">Stock mínimo (alerta cuando esté por debajo)</label>
        <input type="number" id="inputStockMin" class="form-input" placeholder="0" min="0" step="0.1">
      </div>

      <div class="modal-acciones">
        <button class="btn btn-secundario" onclick="cerrarModalProducto()">Cancelar</button>
        <button class="btn btn-primario" onclick="guardarProducto()">Guardar</button>
      </div>
    </div>
  </div>

  <!-- Modal: Cambiar PIN -->
  <div id="modalCambiarPin" class="modal-overlay" style="display:none;" role="dialog" aria-modal="true">
    <div class="modal">
      <h3>Cambiar PIN de administrador</h3>

      <div class="form-grupo">
        <label class="form-label" for="inputPinActual">PIN actual</label>
        <input type="password" id="inputPinActual" class="form-input" maxlength="4" placeholder="••••" inputmode="numeric" autocomplete="current-password">
      </div>
      <div class="form-grupo">
        <label class="form-label" for="inputPinNuevo">Nuevo PIN (4 dígitos)</label>
        <input type="password" id="inputPinNuevo" class="form-input" maxlength="4" placeholder="••••" inputmode="numeric" autocomplete="new-password">
      </div>
      <div class="form-grupo">
        <label class="form-label" for="inputPinConfirmar">Confirmar nuevo PIN</label>
        <input type="password" id="inputPinConfirmar" class="form-input" maxlength="4" placeholder="••••" inputmode="numeric" autocomplete="new-password">
      </div>

      <div class="modal-acciones">
        <button class="btn btn-secundario" onclick="cerrarCambiarPin()">Cancelar</button>
        <button class="btn btn-primario" onclick="guardarNuevoPin()">Guardar PIN</button>
      </div>
    </div>
  </div>

  <!-- ── Spinner ── -->
  <div id="spinnerOverlay" class="spinner-overlay" style="display:none;">
    <div class="spinner"></div>
  </div>

  <!-- ── Toasts ── -->
  <div id="toastContainer" class="toast-container" aria-live="polite"></div>

  <!-- ── Firebase SDK ── -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

  <!-- ── App ── -->
  <script src="js/config.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/admin.js"></script>

</body>
</html>
